<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Bananaball favicon: a banana-yellow baseball on the brand background -->
  <defs>
    <radialGradient id="ball" cx="38%" cy="32%" r="80%">
      <stop offset="0%" stop-color="#ffe375"/>
      <stop offset="55%" stop-color="#ffd23f"/>
      <stop offset="100%" stop-color="#f4b400"/>
    </radialGradient>
  </defs>

  <!-- rounded-square backdrop -->
  <rect width="512" height="512" rx="112" fill="#2b2b2b"/>

  <!-- baseball -->
  <circle cx="256" cy="256" r="176" fill="url(#ball)" stroke="#8a6a00" stroke-width="6"/>

  <!-- stitched seams: two opposing curved arcs with red cross-stitches -->
  <g fill="none" stroke="#c0341d" stroke-width="14" stroke-linecap="round">
    <path d="M132 132 C 196 210, 196 302, 132 380"/>
    <path d="M380 132 C 316 210, 316 302, 380 380"/>
  </g>
  <g stroke="#c0341d" stroke-width="9" stroke-linecap="round">
    <!-- left seam stitches -->
    <line x1="150" y1="168" x2="176" y2="158"/>
    <line x1="164" y1="212" x2="192" y2="206"/>
    <line x1="170" y1="256" x2="198" y2="256"/>
    <line x1="164" y1="300" x2="192" y2="306"/>
    <line x1="150" y1="344" x2="176" y2="354"/>
    <!-- right seam stitches -->
    <line x1="362" y1="168" x2="336" y2="158"/>
    <line x1="348" y1="212" x2="320" y2="206"/>
    <line x1="342" y1="256" x2="314" y2="256"/>
    <line x1="348" y1="300" x2="320" y2="306"/>
    <line x1="362" y1="344" x2="336" y2="354"/>
  </g>
</svg>
